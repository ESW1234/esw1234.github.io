<html>
  <head><meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1"></head>
  <body>
    <h1>SDB3 Channel Menu (ECV2)</h1>
    <p><a id="editThisPageLink" target="_blank" style="color:blue">Edit this page</a></p>
    <script>document.getElementById('editThisPageLink').href = "https://github.com/ESW1234/esw1234.github.io/edit/master" + window.location.pathname;</script>

    <!--
      Custom Channel Menu chain hosted on GitHub Pages.
      fab.js -> channelMenu.js (custom: loads our init.js) -> init.js (ECV2 host bootstrap with channel-menu support).
    -->
    <script type='text/javascript' src='https://esw1234.github.io/godwin/assets/js/fab.js'></script>
    <script type='text/javascript'>
      var initESW = function(gslbBaseURL) {
        embedded_svc.menu.settings.devMode = true;
        embedded_svc.menu.init(
          'https://godwinlaw-sdb3.test1.my.pc-rnd.salesforce.com',
          'https://d.la3-test1-uswest2-core4.pc-aws.salesforceliveagent.com/chat',
          gslbBaseURL,
          '00DSB0000004st3',
          'Embedded_Channel_Menu'
        );
      };

      if (!window.embedded_svc || !window.embedded_svc.menu) {
        var s = document.createElement('script');
        s.setAttribute('src', 'https://esw1234.github.io/godwin/assets/js/fab.js');
        s.onload = function() {
          initESW(null);
        };
        document.body.appendChild(s);
      } else {
        initESW('https://godwinlaw-sdb3.test1.my.pc-rnd.salesforce.com');
      }
    </script>

    <script type='text/javascript'>
      window.addEventListener('onEmbeddedMessagingChannelMenuVisibilityChanged', function(event) {
        console.log('onEmbeddedMessagingChannelMenuVisibilityChanged:', event.detail);
      });
      window.addEventListener('onEmbeddedMessagingReady', function() {
        console.log('onEmbeddedMessagingReady emitted');
      });
      window.addEventListener('onEmbeddedMessagingButtonCreated', function() {
        console.log('onEmbeddedMessagingButtonCreated emitted');
      });

      // WORKAROUND: the Layer 2 LWR app served by this MIAW deployment does not currently
      // emit `cwcfabready` over RPC, so init.js's handleFabReadyEvent never runs and our
      // visibility-change event never fires automatically. Dispatch it manually 3s after
      // page load so Channel Menu unblocks and renders the MIAW item.
      setTimeout(function() {
        if (!window.__channelMenuVisibilityFiredByInit) {
          window.dispatchEvent(new CustomEvent('onEmbeddedMessagingChannelMenuVisibilityChanged', {
            detail: { devName: 'MessagingWeb_One', isVisible: true }
          }));
          console.log('[menu.html] manually fired onEmbeddedMessagingChannelMenuVisibilityChanged workaround');
        }
      }, 3000);
    </script>
  </body>
</html>
