	<button type="button" onclick="fetchAndSetIdentityToken()">setIdentityToken</button><br/><br/>
	<button type="button" onclick="clearSession()">clearSession</button>

<script type='text/javascript'>
	function fetchAndSetToken() {
		     var porticoURL = "https://portico.sfproxy.controltelemetry.aws-dev2-uswest2.aws.sfdc.cl/api/v1/miaw/getJwtToken?issuer=testIssuer&subject=testSubject12345@esw.com&jwtExpInSeconds=6000&keyId=5f103f1b-ee38-404c-ac94-83c427764813";
		     fetch(porticoURL).then(function(response) {
			  return response.json();
		     }).then(function(data) {
			  embeddedservice_bootstrap.userVerificationAPI.setIdentityToken({
			       identityTokenType: "JWT",
			       identityToken: data.accessToken
			  });
		     }).catch(function(err) {
			  console.log('Fetch Error :', err);
		     });
		}

	function clearSession() {
		embeddedservice_bootstrap.userVerificationAPI.clearSession(true);
	}

		});
</script>
